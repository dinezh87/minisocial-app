apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: minisocial-ingress
spec:
  rules:
    - host: app-staging.minisocial.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
    - host: auth-staging.minisocial.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: auth-service
                port:
                  number: 3000
    - host: post-staging.minisocial.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: post-service
                port:
                  number: 8000
    - host: media-staging.minisocial.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: media-service
                port:
                  number: 8080
    - host: user-staging.minisocial.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: user-service
                port:
                  number: 8080
    - host: feed-staging.minisocial.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: feed-service
                port:
                  number: 8080
    - host: notification-staging.minisocial.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: notification-service
                port:
                  number: 8090
