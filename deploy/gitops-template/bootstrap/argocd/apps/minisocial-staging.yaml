apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: minisocial-staging
  namespace: argocd
spec:
  project: minisocial
  source:
    repoURL: REPLACE_WITH_GITOPS_REPO_URL
    targetRevision: REPLACE_WITH_GIT_BRANCH
    path: apps/staging/minisocial
  destination:
    server: https://kubernetes.default.svc
    namespace: minisocial
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
