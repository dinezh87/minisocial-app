version: '3.8'

services:
  # Databases
  postgres:
    image: postgres:15-alpine
    container_name: authservice-postgres
    environment:
      POSTGRES_DB: authdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d authdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7
    container_name: postservice-mongodb
    ports:
      - "27018:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql:
    image: mysql:8.0
    container_name: userservice-mysql
    environment:
      MYSQL_DATABASE: users
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: feedservice-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Microservices
  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: authservice
    env_file:
      - ./auth-service/.env
      - ./auth-service/secrets.env
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  post-service:
    build:
      context: ./post-service
      dockerfile: Dockerfile
    container_name: postservice
    env_file:
      - ./post-service/.env
    environment:
      NOTIFICATION_SERVICE_URL: http://notification-service:8090
    ports:
      - "8000:8000"
    depends_on:
      mongo:
        condition: service_healthy
      notification-service:
        condition: service_started
    restart: unless-stopped

  media-service:
    build:
      context: ./media-service
      dockerfile: Dockerfile
    container_name: mediaservice
    env_file:
      - ./media-service/.env
    environment:
      STORAGE_TYPE: local
      STORAGE_PATH: /app/media
    ports:
      - "8081:8080"
    volumes:
      - ./media_storage:/app/media
    restart: unless-stopped

  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: userservice
    env_file:
      - ./user-service/.env
      - ./user-service/secrets.env
    ports:
      - "8082:8080"
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  feed-service:
    build:
      context: ./feed-service
      dockerfile: Dockerfile
    container_name: feedservice
    env_file:
      - ./feed-service/.env
    ports:
      - "8083:8080"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: notificationservice
    env_file:
      - ./notification-service/.env
    ports:
      - "8090:8090"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_AUTH_URL: http://localhost:3000
        REACT_APP_POST_URL: http://localhost:8000
        REACT_APP_MEDIA_URL: http://localhost:8081
        REACT_APP_USER_URL: http://localhost:8082
        REACT_APP_FEED_URL: http://localhost:8083
        REACT_APP_NOTIFICATION_URL: http://localhost:8090
    container_name: frontend
    ports:
      - "80:80"
    depends_on:
      - auth-service
      - post-service
      - media-service
      - user-service
      - feed-service
      - notification-service
    restart: unless-stopped
      


volumes:
  postgres_data:
  mongodb_data:
  mysql_data:
  redis_data:
