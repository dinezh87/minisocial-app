server {

 listen 80;

 client_max_body_size 50m;

 location /api/auth/ {
   proxy_pass http://auth-service.minisocial.svc.cluster.local:3000/;
   proxy_http_version 1.1;
   proxy_set_header Host $host;
   proxy_set_header X-Real-IP $remote_addr;
   proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
   proxy_set_header X-Forwarded-Proto $scheme;
 }

 location /api/post/ {
   proxy_pass http://post-service.minisocial.svc.cluster.local:8000/;
   proxy_http_version 1.1;
   proxy_set_header Host $host;
   proxy_set_header X-Real-IP $remote_addr;
   proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
   proxy_set_header X-Forwarded-Proto $scheme;
   proxy_buffering off;
   proxy_cache off;
 }

 location /api/media/ {
   proxy_pass http://media-service.minisocial.svc.cluster.local:8080/;
   proxy_http_version 1.1;
   proxy_set_header Host $host;
   proxy_set_header X-Real-IP $remote_addr;
   proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
   proxy_set_header X-Forwarded-Proto $scheme;
 }

 location /api/feed/ {
   proxy_pass http://feed-service.minisocial.svc.cluster.local:8080/;
   proxy_http_version 1.1;
   proxy_set_header Host $host;
   proxy_set_header X-Real-IP $remote_addr;
   proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
   proxy_set_header X-Forwarded-Proto $scheme;
 }

 location /api/notification/ {
   proxy_pass http://notification-service.minisocial.svc.cluster.local:8090/;
   proxy_http_version 1.1;
   proxy_set_header Host $host;
   proxy_set_header X-Real-IP $remote_addr;
   proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
   proxy_set_header X-Forwarded-Proto $scheme;
   proxy_set_header Connection "";
   proxy_buffering off;
   proxy_cache off;
 }

 location / {
   root /usr/share/nginx/html;
   index index.html;
   try_files $uri /index.html;
 }

}
